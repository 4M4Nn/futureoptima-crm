services:
  - type: web
    name: nexora-crm-backend
    env: node
    region: singapore
    plan: starter
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma db push
    startCommand: node src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 7000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: OLLAMA_BASE_URL
        value: http://localhost:11434
      - key: OLLAMA_MODEL
        value: llama3.2
      - key: ENABLE_CRONS
        value: true
      - key: INSTITUTE_NAME
        value: Future Optima IT Solutions
      - key: INSTITUTE_ADDRESS
        value: Kakkanad, Kochi, Kerala - 682030
      - key: INSTITUTE_PHONE
        value: "+91-9876543210"
      - key: INSTITUTE_EMAIL
        value: info@futureoptima.in
